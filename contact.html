<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — MineralSearch</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .contact-page { max-width: 560px; margin: 100px auto 60px; padding: 0 20px; }
    .contact-page h1 { font-size: 2rem; font-weight: 800; margin-bottom: 8px; }
    .contact-page .sub { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 32px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
    .form-group input, .form-group textarea, .form-group select { width:100%; padding:12px; background:var(--bg-input); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:0.9rem; font-family:inherit; outline:none; }
    .form-group input:focus, .form-group textarea:focus { border-color:var(--accent); }
    .form-group textarea { min-height:140px; resize:vertical; }
    .submit-btn { width:100%; padding:14px; background:var(--accent); color:#000; font-size:1rem; font-weight:700; border:none; border-radius:10px; cursor:pointer; }
    .success-msg { display:none; text-align:center; padding:40px; background:var(--bg-card); border:1px solid var(--border); border-radius:12px; }
    .success-msg h2 { color:var(--accent); margin-bottom:8px; }
  </style>
</head>
<body>
<nav class="nav"><div class="nav-inner"><a href="index.html" class="nav-logo"><div class="logo-icon">M</div>MineralSearch</a><ul class="nav-links"><li><a href="wells.html">Wells</a></li><li><a href="map.html">Map</a></li><li><a href="minerals.html">Minerals</a></li><li><a href="login.html" class="nav-cta">Log In</a></li></ul></div></nav>
<div class="contact-page">
  <div id="form-section">
    <h1>Contact Us</h1>
    <p class="sub">Questions? We'll get back to you within 24 hours.</p>
    <form id="cf" name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field" action="/contact.html?success=true">
      <input type="hidden" name="form-name" value="contact">
      <p style="display:none"><input name="bot-field"></p>
      <div class="form-group"><label>Name</label><input type="text" name="name" required placeholder="Your name"></div>
      <div class="form-group"><label>Email</label><input type="email" name="email" required placeholder="your@email.com"></div>
      <div class="form-group"><label>Subject</label><select name="subject"><option>General Question</option><option>Account / Billing</option><option>Data Request</option><option>Bug Report</option><option>Partnership</option></select></div>
      <div class="form-group"><label>Message</label><textarea name="message" required placeholder="How can we help?"></textarea></div>
      <button type="submit" class="submit-btn">Send Message</button>
    </form>
  </div>
  <div class="success-msg" id="success-msg"><h2>Message Sent</h2><p>Thanks! We'll get back to you within 24 hours.</p><a href="index.html" style="color:var(--accent);margin-top:16px;display:inline-block;">Back to Home</a></div>
</div>
<script>if(window.location.search.includes('success=true')){document.getElementById('form-section').style.display='none';document.getElementById('success-msg').style.display='block';}</script>
</body>
</html>
