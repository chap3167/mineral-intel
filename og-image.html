<!DOCTYPE html>
<html>
<head>
<style>
body { margin: 0; width: 1200px; height: 630px; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0a0e17 0%, #131a2b 50%, #0a0e17 100%); font-family: 'Inter', sans-serif; color: #fff; }
.card { text-align: center; }
.logo { display: inline-flex; align-items: center; gap: 12px; font-size: 28px; font-weight: 900; margin-bottom: 24px; }
.logo-box { width: 44px; height: 44px; background: #00d4aa; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 900; color: #000; }
h1 { font-size: 56px; font-weight: 900; line-height: 1.1; margin: 0 0 16px; letter-spacing: -1.5px; }
h1 span { color: #00d4aa; }
p { font-size: 24px; color: #94a3b8; margin: 0; }
.stats { display: flex; gap: 40px; justify-content: center; margin-top: 32px; }
.stat { text-align: center; }
.stat-num { font-size: 36px; font-weight: 900; color: #00d4aa; }
.stat-label { font-size: 14px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
</style>
</head>
<body>
<div class="card">
<div class="logo"><div class="logo-box">M</div> MineralSearch</div>
<h1>Every Well. Every Lease.<br>Every Owner. <span>One Platform.</span></h1>
<p>Texas oil & gas data platform built for landmen</p>
<div class="stats">
<div class="stat"><div class="stat-num">1.3M</div><div class="stat-label">Wells</div></div>
<div class="stat"><div class="stat-num">41K</div><div class="stat-label">Operators</div></div>
<div class="stat"><div class="stat-num">275</div><div class="stat-label">Counties</div></div>
</div>
</div>
</body>
</html>
